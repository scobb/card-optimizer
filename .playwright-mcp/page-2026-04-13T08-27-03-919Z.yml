      - generic [ref=e296]:
        - heading "Our Methodology" [level=2] [ref=e297]:
          - img [ref=e298]
          - text: Our Methodology
        - generic [ref=e301]:
          - paragraph [ref=e302]:
            - text: Every card in our database is evaluated using the same transparent formula. We compute an
            - strong [ref=e303]: effective cash-back percentage
            - text: for each spending category by multiplying the category reward multiplier by the card's point value (in cents per point for rewards cards, or face value for cash-back cards). A 3× multiplier on a card with 1.25¢/pt valuation yields 3.75% effective — higher than most competing cash-back cards at first glance.
          - paragraph [ref=e304]:
            - text: For
            - strong [ref=e305]: annual fee analysis
            - text: ", we model a realistic portfolio of annual credits and subtract them from the stated fee to arrive at a net effective cost. We use conservative estimates: we only count credits you are likely to use naturally, not ones that require unusual spending behavior."
          - paragraph [ref=e306]:
            - strong [ref=e307]: Sign-up bonuses
            - text: are amortized over two years at conservative redemption values (1¢/pt for most rewards currencies, slightly higher for programs with documented transfer partner value). This gives us a levelized annual bonus value that makes it fair to compare cards across different bonus sizes and spend requirements.
          - paragraph [ref=e308]:
            - text: The best way to apply this methodology to your own situation is to
            - link "upload your transaction history" [ref=e309] [cursor=pointer]:
              - /url: /upload
            - text: and let CardOptimizer compute exact projections based on your actual spending mix — not the averages we use here.
