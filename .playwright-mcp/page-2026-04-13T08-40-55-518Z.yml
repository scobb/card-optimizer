      - paragraph [ref=e109]: NerdWallet is the dominant player in personal finance content. Millions of people visit it every month for credit card advice, and for good reason — its editorial team produces thorough, well-researched reviews. But the way NerdWallet recommends cards is fundamentally different from CardOptimizer, and for a meaningful subset of users, that difference matters a lot.
      - generic [ref=e111]:
        - 'heading "The Core Difference: Generic vs. Personalized" [level=2] [ref=e112]'
        - paragraph [ref=e113]:
          - text: NerdWallet's card recommendations are
          - strong [ref=e114]: generic
          - text: . When you visit a page like "Best Travel Credit Cards," you see the same list whether you spend $200/month on travel or $2,000/month. The rankings reflect NerdWallet's editorial judgment — a combination of reward rates, bonus sizes, affiliate relationships, and editorial criteria — not your personal spending pattern.
        - paragraph [ref=e115]:
          - text: "CardOptimizer takes the opposite approach:"
          - strong [ref=e116]: upload your actual transaction history
          - text: (from Monarch, Copilot, Chase, Amex, or any CSV export) and the tool calculates exactly which cards would earn the most for your specific spending mix. If you spend $800/month on groceries and $150/month on dining, CardOptimizer tells you the Amex Gold earns you $1,140/year on those two categories alone — not a generalized "great for foodies" editorial take.
        - 'heading "Privacy: A Fundamental Architectural Difference" [level=2] [ref=e117]'
        - paragraph [ref=e118]: To get personalized recommendations on NerdWallet, you typically need to create an account, provide your email, and in some cases connect financial accounts. NerdWallet collects this data to improve its product and target you with relevant financial offers.
        - paragraph [ref=e119]:
          - text: "CardOptimizer was built on a different premise:"
          - strong [ref=e120]: your transaction data never leaves your browser
          - text: . The CSV you upload is parsed entirely client-side using JavaScript. No data is sent to our servers. We have no database of your transactions. We cannot see your spending even if we wanted to. You can verify this by opening your browser's Network tab while uploading — you'll see zero outbound requests containing your transaction data.
        - paragraph [ref=e121]: For many users — especially those wary of sharing financial data with ad-supported platforms — this is a meaningful distinction. Your spending patterns are some of the most sensitive personal data that exists. CardOptimizer's architecture means that data never exists anywhere except your local browser session.
        - heading "What NerdWallet Does Better" [level=2] [ref=e122]
        - paragraph [ref=e123]: Honesty requires acknowledging where NerdWallet excels. Its editorial depth is unmatched — if you want a 3,000-word review of the Chase Sapphire Reserve covering lounge access, foreign transaction fees, primary vs. secondary rental car insurance, and year-over-year changes to the card's benefits, NerdWallet has that content. We don't.
        - paragraph [ref=e124]: "NerdWallet also covers a much broader financial product universe: savings accounts, mortgages, student loans, investment accounts, insurance. CardOptimizer is focused exclusively on credit card reward optimization. If you need broader financial guidance, NerdWallet is a better starting point."
        - paragraph [ref=e125]: Their database includes more cards than ours — particularly secured cards, student cards, and niche issuer products. Our catalog of 20+ cards covers the most popular reward-optimizing cards used by the majority of consumers, but we don't have every card in existence.
        - heading "The Bottom Line" [level=2] [ref=e126]
        - paragraph [ref=e127]:
          - strong [ref=e128]: Use NerdWallet
          - text: when you want comprehensive editorial coverage, a broad financial product universe, or detailed long-form card reviews.
        - paragraph [ref=e129]:
          - strong [ref=e130]: Use CardOptimizer
          - text: when you want to know — based on your actual spending — exactly how much you'd earn with each card, which card to use for each spending category, and what the optimal combination of 2-4 cards is for your wallet. Especially if privacy matters to you.
        - paragraph [ref=e131]: They are not mutually exclusive. Many users read NerdWallet for editorial context, then come to CardOptimizer to run the actual math on their own spending before applying.
